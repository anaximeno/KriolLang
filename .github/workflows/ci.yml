name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update -q
          sudo apt-get install -y make flex bison clang clang++ llvm-19 llvm-19-dev

      - name: Run tests
        run: make test
